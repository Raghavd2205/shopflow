services:

  # в”Ђв”Ђв”Ђ Infrastructure в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  redis:
    image: redis:7-alpine
    container_name: shopflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shopflow-network

  # в”Ђв”Ђв”Ђ Node.js Services в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: shopflow-gateway
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - ORDER_SERVICE_URL=http://order-service:8082
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - user-service
      - product-service
      - order-service
    networks:
      - shopflow-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: shopflow-user
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_HOST=${DB_HOST}
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=shopflow_users
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - REFRESH_TOKEN_EXPIRES_IN=7d
    depends_on:
      - redis
    networks:
      - shopflow-network

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: shopflow-product
    restart: always
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/shopflow_products
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
    depends_on:
      - redis
    networks:
      - shopflow-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: shopflow-order
    restart: always
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/shopflow_orders
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_SERVICE_SECRET=${INTERNAL_SERVICE_SECRET}
      - PRODUCT_SERVICE_URL=http://product-service:8081
    depends_on:
      - redis
      - product-service
    networks:
      - shopflow-network

volumes:
  redis_data:

networks:
  shopflow-network:
    driver: bridge